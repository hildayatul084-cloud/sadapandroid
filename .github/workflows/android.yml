name: Build Android APK Subfolder Fix

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Di sini kita arahkan robot untuk masuk ke react-native-sms-gateway/android
      - name: Build APK Debug
        run: |
          cd react-native-sms-gateway/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Jalur pengambilan file APK juga disesuaikan dengan folder utamanya
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Android-Kamu
          path: react-native-sms-gateway/android/app/build/outputs/apk/debug/app-debug.apk
