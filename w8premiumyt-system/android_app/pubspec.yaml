name: w8premiumyt
description: SMS Gateway Otomatis - W8PREMIUMYT

# Versi aplikasi
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP Client untuk request ke backend
  http: ^1.1.0
  
  # SMS & Phone Permission Handler
  telephony: ^0.2.0
  permission_handler: ^11.0.1
  
  # Background Task Manager
  workmanager: ^0.5.1
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  
  # Local Database untuk offline queue
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Local Storage untuk config
  shared_preferences: ^2.2.2
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Device Info
  device_info_plus: ^9.1.0
  battery_plus: ^5.0.2
  
  # Foreground Service Notification
  flutter_local_notifications: ^16.1.0
  
  # JSON Serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets untuk .env file
  assets:
    - .env